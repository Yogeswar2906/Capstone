<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .modal {
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease-in-out;
        }

        .modal.open {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            transform: scale(0.95);
            transition: transform 0.3s ease-in-out;
        }

        .modal.open .modal-content {
            transform: scale(1);
        }

        #video-preview,
        #video-stream {
            transform: scaleX(-1);
            background-color: #000;
        }
    </style>
</head>

<body class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-screen text-gray-800 antialiased">

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3"></div>

    <div id="login-container" class="flex items-center justify-center min-h-screen p-4">
        <div class="glass w-full max-w-md p-8 rounded-2xl shadow-2xl">
            <h2 class="text-3xl font-bold text-gray-900 text-center mb-8">Attendance System</h2>
            <form id="login-form" class="space-y-6">
                <input type="text" id="username" class="w-full px-4 py-3 rounded-lg border border-gray-300"
                    placeholder="admin" required>
                <input type="password" id="password" class="w-full px-4 py-3 rounded-lg border border-gray-300"
                    placeholder="••••••••" required>
                <button type="submit"
                    class="w-full bg-indigo-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-indigo-700">Sign
                    In</button>
            </form>
        </div>
    </div>

    <div id="app-container" class="hidden min-h-screen flex flex-col">
        <header class="glass sticky top-0 z-30 shadow-sm">
            <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
                <h1 class="text-xl font-bold text-gray-900">Smart Attendance</h1>
                <button id="logout-btn" class="text-red-600 hover:text-red-800 font-medium">Logout</button>
            </div>
        </header>

        <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-8">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                <button id="register-btn"
                    class="glass p-6 rounded-2xl border-l-4 border-blue-500 hover:shadow-xl transition">
                    <h3 class="text-lg font-bold">Register Student</h3>
                    <p class="text-sm text-gray-500">Add new faces to database</p>
                </button>

                <button id="scan-btn"
                    class="glass p-6 rounded-2xl border-l-4 border-green-500 hover:shadow-xl transition">
                    <h3 class="text-lg font-bold">Start Scan</h3>
                    <p class="text-sm text-gray-500">Mark attendance now</p>
                </button>

                <button id="analytics-btn"
                    class="glass p-6 rounded-2xl border-l-4 border-purple-500 hover:shadow-xl transition">
                    <h3 class="text-lg font-bold">Analytics</h3>
                    <p class="text-sm text-gray-500">View attendance stats</p>
                </button>

                <button id="export-btn"
                    class="glass p-6 rounded-2xl border-l-4 border-gray-500 hover:shadow-xl transition">
                    <h3 class="text-lg font-bold">Export CSV</h3>
                    <p class="text-sm text-gray-500">Download report</p>
                </button>
            </div>

            <div class="glass rounded-2xl shadow-lg overflow-hidden">
                <div class="p-6 border-b border-gray-200 flex justify-between items-center">
                    <h3 class="text-xl font-bold">Today's Attendance</h3>
                    <span id="student-count"
                        class="bg-indigo-100 text-indigo-800 text-xs font-semibold px-2.5 py-0.5 rounded-full">0
                        Students</span>
                </div>
                <table class="min-w-full text-left text-sm">
                    <thead class="bg-gray-50 uppercase font-semibold text-gray-500">
                        <tr>
                            <th class="px-6 py-4">Roll No</th>
                            <th class="px-6 py-4">Name</th>
                            <th class="px-6 py-4">Time</th>
                            <th class="px-6 py-4">Status</th>
                        </tr>
                    </thead>
                    <tbody id="attendance-tbody" class="divide-y divide-gray-100"></tbody>
                </table>
            </div>
        </main>
    </div>

    <div id="register-modal"
        class="modal fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
        <div class="modal-content bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden">
            <div class="p-6">
                <h2 class="text-xl font-bold mb-4">Register Student</h2>
                <div class="relative w-full h-64 bg-gray-900 rounded-xl overflow-hidden mb-6">
                    <video id="video-preview" class="w-full h-full object-cover" autoplay playsinline></video>
                </div>
                <input type="text" id="rollNo" class="w-full px-4 py-2 mb-3 rounded-lg border" placeholder="Roll No">
                <input type="text" id="name" class="w-full px-4 py-2 rounded-lg border" placeholder="Full Name">
            </div>
            <div class="p-6 bg-gray-50 flex justify-end gap-3">
                <button class="modal-close-btn px-4 py-2 rounded-lg text-gray-600">Cancel</button>
                <button id="capture-btn" class="px-6 py-2 rounded-lg bg-blue-600 text-white">Capture & Register</button>
            </div>
        </div>
    </div>

    <div id="scan-modal"
        class="modal fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
        <div class="modal-content bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden">
            <div class="p-6 bg-black relative">
                <img id="video-stream" src="" class="w-full h-80 object-contain rounded-lg bg-gray-900">
                <div class="absolute top-8 right-8 bg-black/50 text-white px-4 py-2 rounded-lg font-bold">
                    <span id="scan-timer">15</span>s
                </div>
            </div>
            <div class="p-6 bg-gray-50 flex justify-between items-center">
                <p class="text-sm text-gray-500">Scanning in progress...</p>
                <button class="modal-close-btn px-6 py-2 rounded-lg bg-red-500 text-white">Stop Scan</button>
            </div>
        </div>
    </div>

    <div id="analytics-modal"
        class="modal fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4">
        <div class="modal-content bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6">
            <h2 class="text-xl font-bold mb-4">Analytics</h2>
            <canvas id="attendance-chart"></canvas>
            <button class="modal-close-btn mt-4 w-full py-2 bg-gray-200 rounded-lg">Close</button>
        </div>
    </div>

    <script>
        // Dynamic API URL: uses host origin if served, falls back to 127.0.0.1:5000 if opened locally
        const API_BASE_URL = window.location.protocol === 'file:' || window.location.origin === 'null'
            ? 'http://127.0.0.1:5000'
            : window.location.origin;
        let studentRoster = [];
        let attendanceLog = [];
        let stream = null;
        let scanTimerInterval;
        let chartInstance = null;

        // UI Helpers
        const showToast = (msg, type = 'success') => {
            const toast = document.createElement('div');
            toast.className = `${type === 'success' ? 'bg-green-500' : 'bg-red-500'} text-white px-6 py-4 rounded-xl shadow-lg mb-2`;
            toast.innerText = msg;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        };

        const openModal = (id) => document.getElementById(id).classList.add('open');
        const closeModal = (id) => {
            document.getElementById(id).classList.remove('open');
            if (id === 'register-modal') stopCamera();
            if (id === 'scan-modal') {
                document.getElementById('video-stream').src = '';
                clearInterval(scanTimerInterval);
                fetch(`${API_BASE_URL}/camera/start`, { method: 'POST' }); // Restart backend cam
            }
        };

        const updateTable = () => {
            const tbody = document.getElementById('attendance-tbody');
            tbody.innerHTML = '';
            document.getElementById('student-count').innerText = `${studentRoster.length} Students`;

            studentRoster.forEach(s => {
                const log = attendanceLog.find(l => l.rollNo === s.rollNo);
                const status = log ? `<span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-xs font-bold">Present</span>`
                    : `<span class="bg-red-50 text-red-500 px-3 py-1 rounded-full text-xs font-bold">Absent</span>`;
                const row = `
                    <tr class="hover:bg-white/50 transition">
                        <td class="px-6 py-4">${s.rollNo}</td>
                        <td class="px-6 py-4">${s.name}</td>
                        <td class="px-6 py-4 font-mono text-xs text-gray-500">${log ? log.time : '-'}</td>
                        <td class="px-6 py-4">${status}</td>
                    </tr>`;
                tbody.insertAdjacentHTML('beforeend', row);
            });
        };

        // Actions
        const fetchStudents = async () => {
            try {
                const res = await fetch(`${API_BASE_URL}/students`);
                studentRoster = await res.json();
                updateTable();
            } catch (e) { showToast('Error loading students', 'error'); }
        };

        const startCamera = async () => {
            try {
                await fetch(`${API_BASE_URL}/camera/stop`, { method: 'POST' }); // Stop backend cam
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video-preview').srcObject = stream;
            } catch (e) { showToast('Camera access denied', 'error'); }
        };

        const stopCamera = () => {
            if (stream) stream.getTracks().forEach(t => t.stop());
            fetch(`${API_BASE_URL}/camera/start`, { method: 'POST' }); // Restart backend
        };

        // Event Listeners
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const res = await fetch(`${API_BASE_URL}/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            if (res.ok) {
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                fetchStudents();
            } else showToast('Invalid credentials', 'error');
        });

        document.getElementById('register-btn').addEventListener('click', () => {
            openModal('register-modal');
            startCamera();
        });

        document.getElementById('capture-btn').addEventListener('click', async () => {
            const rollNo = document.getElementById('rollNo').value;
            const name = document.getElementById('name').value;
            if (!rollNo || !name) return showToast('Fill all fields', 'error');

            const video = document.getElementById('video-preview');
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            const res = await fetch(`${API_BASE_URL}/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ rollNo, name, imageData: canvas.toDataURL('image/jpeg') })
            });
            const data = await res.json();

            if (data.success) {
                showToast(data.message);
                fetchStudents();
                closeModal('register-modal');
            } else showToast(data.error, 'error');
        });

        document.getElementById('scan-btn').addEventListener('click', async () => {
            // FIX: Clear local log visually first
            attendanceLog = [];
            updateTable();

            await fetch(`${API_BASE_URL}/start-scan`, { method: 'POST' });
            openModal('scan-modal');

            const img = document.getElementById('video-stream');
            img.src = `${API_BASE_URL}/video_feed?t=${Date.now()}`;

            let timeLeft = 15;
            const timerEl = document.getElementById('scan-timer');
            timerEl.innerText = timeLeft;

            scanTimerInterval = setInterval(async () => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(scanTimerInterval);
                    img.src = '';

                    const res = await fetch(`${API_BASE_URL}/get-results`);
                    const results = await res.json();

                    results.forEach(r => {
                        if (!attendanceLog.some(l => l.rollNo === r.rollNo)) {
                            attendanceLog.push({ ...r, time: new Date().toLocaleTimeString() });
                        }
                    });

                    updateTable();
                    closeModal('scan-modal');
                    showToast(`Scan complete. ${results.length} present.`);
                }
            }, 1000);
        });

        document.getElementById('analytics-btn').addEventListener('click', () => {
            openModal('analytics-modal');
            if (chartInstance) chartInstance.destroy();
            const present = attendanceLog.length;
            const absent = studentRoster.length - present;

            chartInstance = new Chart(document.getElementById('attendance-chart'), {
                type: 'doughnut',
                data: {
                    labels: ['Present', 'Absent'],
                    datasets: [{
                        data: [present, absent],
                        backgroundColor: ['#10b981', '#ef4444'],
                        borderWidth: 0
                    }]
                }
            });
        });

        document.getElementById('export-btn').addEventListener('click', () => {
            const rows = [['Roll No', 'Name', 'Time', 'Status']];
            studentRoster.forEach(s => {
                const log = attendanceLog.find(l => l.rollNo === s.rollNo);
                rows.push([s.rollNo, s.name, log ? log.time : '-', log ? 'Present' : 'Absent']);
            });
            const csv = "data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n");
            const link = document.createElement("a");
            link.href = encodeURI(csv);
            link.download = "attendance.csv";
            link.click();
        });

        document.querySelectorAll('.modal-close-btn').forEach(btn => {
            btn.addEventListener('click', (e) => closeModal(e.target.closest('.modal').id));
        });

        document.getElementById('logout-btn').addEventListener('click', () => location.reload());
    </script>
</body>

</html>
